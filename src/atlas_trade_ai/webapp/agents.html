<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent 运行 - AtlasTradeAI</title>
    <link rel="stylesheet" href="/ui/assets/styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">AtlasTradeAI</div>
        <nav class="nav">
          <a class="nav-link" href="/ui/index.html">总览</a>
          <a class="nav-link" href="/ui/orders.html">订单看板</a>
          <a class="nav-link active" href="/ui/agents.html">Agent 运行</a>
          <a class="nav-link" href="/ui/integrations.html">系统集成</a>
        </nav>
      </aside>
      <main class="content">
        <header class="page-header">
          <div>
            <h1>Agent 监控中台</h1>
            <p>查看每个 Agent 的技能、运行模式、触发事件、执行记录与整体工作效果。</p>
          </div>
          <div class="toolbar">
            <button id="refresh-agents" class="primary">刷新 Agent</button>
          </div>
        </header>

        <section id="agent-kpis" class="kpi-grid"></section>

        <section class="grid two-col">
          <div class="panel">
            <div class="panel-title">
              <h2>Agent 技能画像</h2>
              <span>角色层、技能、能力边界</span>
            </div>
            <div id="agent-catalog" class="list"></div>
          </div>
          <div class="panel">
            <div class="panel-title">
              <h2>最近执行日志</h2>
              <span>最近触发的工作记录</span>
            </div>
            <div id="agent-runs" class="list"></div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-title">
            <h2>Agent 运行表现</h2>
            <span>运行次数、最近执行、引擎来源</span>
          </div>
          <div id="agent-performance" class="list"></div>
        </section>
      </main>
    </div>
    <script type="module" src="/ui/assets/agents.js"></script>
  </body>
</html>
