<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent 运行 - AtlasTradeAI</title>
    <link rel="stylesheet" href="/ui/assets/styles.css" />

  <body>
    <div class="shell">
      <aside class="sidebar">

        <nav class="nav">
