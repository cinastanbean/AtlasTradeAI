<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>负责人任务台 - AtlasTradeAI</title>
    <link rel="stylesheet" href="/ui/assets/styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">AtlasTradeAI</div>
        <nav class="nav">
          <a class="nav-link" href="/ui/index.html">总览</a>
          <a class="nav-link" href="/ui/orders.html">订单看板</a>
          <a class="nav-link active" href="/ui/tasks.html">负责人任务台</a>
          <a class="nav-link" href="/ui/agents.html">Agent 运行</a>
          <a class="nav-link" href="/ui/integrations.html">系统集成</a>
        </nav>
      </aside>
      <main class="content">
        <header class="page-header">
          <div>
            <h1>负责人任务台</h1>
            <p>查看升级任务与普通任务如何分配到具体负责人，并对任务状态进行闭环处理。</p>
          </div>
          <div class="toolbar">
            <button id="refresh-tasks" class="primary">刷新任务</button>
          </div>
        </header>

        <section id="task-kpis" class="kpi-grid"></section>

        <section class="grid two-col">
          <div class="panel">
            <div class="panel-title">
              <h2>负责人视图</h2>
              <span>按人查看待办与升级压力</span>
            </div>
            <div id="owner-view" class="list"></div>
          </div>
          <div class="panel">
            <div class="panel-title">
              <h2>升级任务</h2>
              <span>中枢升级与 SLA 超时任务</span>
            </div>
            <div id="escalation-task-view" class="list"></div>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="/ui/assets/tasks.js"></script>
  </body>
</html>
